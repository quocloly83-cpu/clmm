<div class="wrap">
  <div class="card" style="max-width:760px">
    <div class="top">
      <div class="brand">
        <div class="logoBox">{{LOGO}}</div>
        <div>
          <h1 class="title">Admin Tạo Key</h1>
          <div class="sub">Admin riêng tại /huytan • mật khẩu lấy từ ENV</div>
          <div class="credit">CRE HUY FANTA</div>
        </div>
      </div>
    </div>
    <div class="content">
      <div class="loginHero">
        <input id="adminKey" class="input" type="password" placeholder="Nhập admin password từ ENV">
        <input id="customKey" class="input" style="margin-top:10px" placeholder="Key muốn tạo (để trống = tự random)">
        <div class="grid2" style="margin-top:10px">
          <input id="uses" class="input" type="number" value="50" placeholder="Số thiết bị tối đa">
          <input id="days" class="input" type="number" value="30" placeholder="Số ngày sử dụng">
        </div>
        <div class="grid2" style="margin-top:10px">
          <button class="btn" style="margin-top:0" onclick="taoKey()">Tạo Key</button>
          <button class="smallBtn" style="height:56px" onclick="taiDanhSach()">Tải danh sách key</button>
        </div>
        <div id="result" class="msg" style="margin-top:12px"></div>
        <div id="list" class="listWrap" style="margin-top:14px"></div>
      </div>
    </div>
  </div>
</div>
<script>
async function taoKey() {
  const adminKey = document.getElementById('adminKey').value.trim();
  const customKey = document.getElementById('customKey').value.trim();
  const uses = Number(document.getElementById('uses').value || 50);
  const days = Number(document.getElementById('days').value || 30);
  const result = document.getElementById('result');
  result.innerHTML = 'Đang tạo key...';
  try {
    const res = await fetch('/api/create', { method:'POST', headers:{ 'Content-Type':'application/json', 'x-admin-key':adminKey }, body:JSON.stringify({ key:customKey, uses, days }) });
    const data = await res.json();
    if (!data.ok) throw new Error(data.msg || 'Tạo key thất bại');
    result.innerHTML = '<span class="ok">✅ Key: <b>' + data.key + '</b><br>📱 Lượt thiết bị: ' + data.usesLeft + '/' + data.totalDevices + '<br>⏳ Hết hạn: ' + data.expireText + '</span>';
    taiDanhSach();
  } catch (e) {
    result.innerHTML = '<span class="err">❌ ' + e.message + '</span>';
  }
}
async function taiDanhSach() {
  const adminKey = document.getElementById('adminKey').value.trim();
  const box = document.getElementById('list');
  box.innerHTML = '<div class="listItem">Đang tải...</div>';
  try {
    const res = await fetch('/api/list', { headers:{ 'x-admin-key': adminKey } });
    const data = await res.json();
    if (!data.ok) throw new Error(data.msg || 'Không tải được danh sách');
    if (!data.items.length) { box.innerHTML = '<div class="listItem">Chưa có key nào.</div>'; return; }
    box.innerHTML = data.items.map(item => '<div class="listItem"><div class="k">🔑 ' + item.key + '</div><div>📱 Còn: ' + item.usesLeft + '/' + item.totalDevices + '</div><div>⏳ Hạn: ' + item.expireText + '</div><div>🗓 Tạo: ' + item.createdText + '</div><div>📲 Máy: ' + (item.devices.length ? item.devices.length : 0) + '</div><div style="margin-top:10px"><button class="smallBtn" style="height:42px" onclick="xoaKey(\'' + item.key + '\')">Xóa key</button></div></div>').join('');
  } catch (e) {
    box.innerHTML = '<div class="listItem err">❌ ' + e.message + '</div>';
  }
}
async function xoaKey(key) {
  const adminKey = document.getElementById('adminKey').value.trim();
  if (!confirm('Xóa key ' + key + ' ?')) return;
  await fetch('/api/delete', { method:'POST', headers:{ 'Content-Type':'application/json', 'x-admin-key':adminKey }, body:JSON.stringify({ key }) });
  taiDanhSach();
}
</script>
